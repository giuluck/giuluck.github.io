career-profile:
    title: About Me
    summary: |
      I am a PhD student in Computer Science & Engineering at the **University of Bologna**.
      
      My main focus is on **Integrated Methodologies for Optimization, Constraint Reasoning, and Machine Learning**,
      but I have been exploring as well other AI domains such as Fairness and Creativity.
      
      In my free time, I also play in an electropop duo.
      We are called **Divinae Miranda** and you can listen to our songs [<u>here</u>](https://open.spotify.com/intl-it/artist/2wvpQCjOmseuzCLC9orKpn?si=px_O1STORbipCWJEeLZpXQ).

